<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>TLDR Smart Reader</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
			rel="stylesheet"
		>
		<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ["Inter", "sans-serif"],
						display: ["Outfit", "sans-serif"],
					},
					colors: {
						brand: {
							50: "#eef2ff",
							100: "#e0e7ff",
							500: "#6366f1", // Indigo
							600: "#4f46e5",
							700: "#4338ca",
							900: "#312e81",
						},
						slate: {
							850: "#1e293b",
							900: "#0f172a",
						},
					},
					boxShadow: {
						soft: "0 2px 10px rgba(0, 0, 0, 0.03)",
						"soft-hover": "0 10px 30px -5px rgba(0, 0, 0, 0.06)",
					},
					animation: {
						"fade-in": "fadeIn 0.5s ease-out",
						"slide-up": "slideUp 0.5s ease-out",
					},
					keyframes: {
						fadeIn: {
							"0%": { opacity: "0" },
							"100%": { opacity: "1" },
						},
						slideUp: {
							"0%": { transform: "translateY(10px)", opacity: "0" },
							"100%": { transform: "translateY(0)", opacity: "1" },
						},
					},
				},
			},
		};
		</script>
		<style>
		body {
			background-color: #f8fafc; /* Slate 50 */
			-webkit-font-smoothing: antialiased;
			color: #0f172a;
		}
		/* Hide scrollbar for clean look but allow scroll */
		.no-scrollbar::-webkit-scrollbar {
			display: none;
		}
		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}
		</style>
		<script type="importmap">
		{
			"imports": {
				"react": "https://aistudiocdn.com/react@^19.2.0",
				"react/": "https://aistudiocdn.com/react@^19.2.0/",
				"react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
				"@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
				"lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
			}
		}
		</script>
		<link rel="stylesheet" href="/index.css">
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/index.tsx"></script>
	</body>
</html>
