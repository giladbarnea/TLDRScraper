<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Liquid Glass — iOS weak path (blur + gradient + specular)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!--
      Self-contained reproduction of the *base* Liquid Glass recipe the client
      ships, with the iOS-dead SVG displacement lens removed. The goal: confirm
      how blur + white gradient + specular box-shadow alone read on a real
      iPhone behind a near-white, light-gray app background. This is the
      "honest weak path" (option 1) before porting to SelectionActionDock.
    -->
    <main class="feed">
      <header class="feed__header">
        <h1>Anthropic News</h1>
        <span class="feed__count">1 / 2</span>
      </header>

      <!-- Article rows: the backdrop the glass must dampen but not erase. -->
      <section class="rows" id="rows"></section>
    </main>

    <!-- Live debug panel — tune the material on-device. -->
    <div class="panel" id="panel">
      <div class="panel__row">
        <span>white %</span><input type="range" id="white" min="0" max="100" value="63" />
        <output id="white_v">63</output>
      </div>
      <div class="panel__row">
        <span>blur px</span><input type="range" id="blur" min="0" max="30" value="7" />
        <output id="blur_v">7</output>
      </div>
      <div class="panel__row">
        <span>saturate %</span><input type="range" id="sat" min="100" max="300" value="206" />
        <output id="sat_v">206</output>
      </div>
      <div class="panel__row">
        <span>brightness</span><input type="range" id="bright" min="80" max="160" value="96" />
        <output id="bright_v">0.96</output>
      </div>
      <div class="panel__row">
        <span>dim %</span><input type="range" id="dim" min="0" max="30" value="6" />
        <output id="dim_v">6</output>
      </div>
      <div class="panel__row">
        <span>light up %</span><input type="range" id="lit" min="0" max="100" value="25" />
        <output id="lit_v">25</output>
      </div>
      <label class="panel__check"><input type="checkbox" id="preview_press" /> preview press (Read)</label>
      <button id="panel_toggle" class="panel__toggle">hide</button>
    </div>

    <!-- Apple-style dim of everything behind the surface (point 3). Sits below
         the dock so the dock's backdrop-filter samples the dimmed feed too. -->
    <div class="scrim" id="scrim"></div>

    <!-- Fixed bottom dock — the surface under test. -->
    <div class="dock-wrap">
      <div class="liquid-glass-surface" id="dock">
        <div class="dock">
          <!-- Icons are the exact lucide paths the client ships (X, Check,
               Trash2, Podcast, GitMerge, FileText) — drawn on lucide's native
               24-grid at stroke-width 2, the closest web stand-in for SF Symbols. -->
          <button class="dock-btn">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
            <label>Deselect</label>
          </button>
          <button class="dock-btn">
            <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></svg>
            <label>Read</label>
          </button>
          <button class="dock-btn dock-btn--danger">
            <svg viewBox="0 0 24 24"><path d="M3 6h18" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></svg>
            <label>Remove</label>
          </button>
          <button class="dock-btn dock-btn--accent">
            <svg viewBox="0 0 24 24"><path d="M16.85 18.58a9 9 0 1 0-9.7 0" /><path d="M8 14a5 5 0 1 1 8 0" /><circle cx="12" cy="11" r="1" /><path d="M13 17a1 1 0 1 0-2 0l.5 4.5a.5.5 0 1 0 1 0Z" /></svg>
            <label>Podcast</label>
          </button>
          <button class="dock-btn dock-btn--accent">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3" /><circle cx="6" cy="6" r="3" /><path d="M6 21V9a9 9 0 0 0 9 9" /></svg>
            <label>Digest</label>
          </button>
          <button class="dock-btn">
            <svg viewBox="0 0 24 24"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /><path d="M16 13H8" /><path d="M16 17H8" /><path d="M10 9H8" /></svg>
            <label>Summarize</label>
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
