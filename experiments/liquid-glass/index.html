<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Liquid Glass — Clear Button over Grey</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" id="stage">
      <!--
        Layer 0: backdrop canvas. Draws the grey gradient + headline + body
        text. Used both visually AND as the WebGL texture source for the lens.
      -->
      <canvas id="backdrop" class="stage__backdrop" aria-hidden="true"></canvas>

      <!--
        Layer 1: lens canvas. Full-viewport WebGL surface. Transparent
        everywhere except inside the pill silhouette, where it samples the
        backdrop with rim-concentrated refraction offsets.
      -->
      <canvas id="lens" class="stage__lens" aria-hidden="true"></canvas>

      <!--
        Layer 2: the pill. CSS material layers (tint, glow, specular) stack
        on top of the lensed refraction. Real refraction underneath, real
        Liquid Glass shading on top.
      -->
      <button class="lg-pill" id="pill" type="button" aria-label="Clear glass pill button">
        <span class="lg-pill__tint" aria-hidden="true"></span>
        <span class="lg-pill__glow" aria-hidden="true"></span>
        <span class="lg-pill__specular" aria-hidden="true"></span>
        <span class="lg-pill__content">
          <svg class="lg-icon" viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="19,7 9,16 19,25" />
          </svg>
          <svg class="lg-icon" viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="16" y1="7" x2="16" y2="25" />
            <line x1="7" y1="16" x2="25" y2="16" />
          </svg>
          <svg class="lg-icon" viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="16" cy="16" r="9" />
          </svg>
        </span>
      </button>
    </main>

    <!-- Lens fragment shader source — kept out of the JS file for readability. -->
    <script id="lensFragShader" type="x-shader/x-fragment">
      precision highp float;

      uniform vec2  iResolution;   // canvas pixel size
      uniform vec4  iPill;         // pill rect: x, y, w, h in canvas pixels (y from top)
      uniform sampler2D iBackdrop; // backdrop canvas as texture
      uniform float iTime;
      uniform float iPressIntensity;
      uniform vec2  iPress;        // press center in canvas pixels

      /* Signed distance to a rounded box. p is relative to box center. */
      float sdRoundedBox(vec2 p, vec2 b, float r) {
        vec2 q = abs(p) - b + vec2(r);
        return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
      }

      void main() {
        // Fragment in canvas pixel space, y-up.
        vec2 frag = gl_FragCoord.xy;
        // Backdrop sample UV — texture is uploaded with y flipped to match gl_FragCoord.
        vec2 buv = frag / iResolution;

        // Pill center and half-extents in canvas pixels.
        // iPill is given in DOM coords (y from top); convert to GL y-up.
        vec2 pillCenter = vec2(iPill.x + iPill.z * 0.5,
                               iResolution.y - (iPill.y + iPill.w * 0.5));
        vec2 pillHalf   = vec2(iPill.z * 0.5, iPill.w * 0.5);
        float pillR     = min(pillHalf.x, pillHalf.y);

        // Distance from pill SDF — negative inside, zero at edge, positive outside.
        vec2  pLocal = frag - pillCenter;
        float d      = sdRoundedBox(pLocal, pillHalf, pillR);

        // Outside the pill silhouette → fully transparent.
        // The CSS specular and shadow will define the edge fall-off.
        if (d > 1.5) {
          gl_FragColor = vec4(0.0);
          return;
        }

        // Inside-the-pill mask with a 1.5px soft edge for clean AA.
        float inside = smoothstep(1.5, -1.5, d);

        // ---- Refraction --------------------------------------------------
        // Compute the SDF gradient (approximate normal) via central differences.
        // The gradient points OUTWARD from the surface; we offset the sample
        // INWARD (against the gradient) so light appears to bend toward center.
        float eps = 1.5;
        vec2 nrm = normalize(vec2(
          sdRoundedBox(pLocal + vec2(eps, 0.0), pillHalf, pillR) -
          sdRoundedBox(pLocal - vec2(eps, 0.0), pillHalf, pillR),
          sdRoundedBox(pLocal + vec2(0.0, eps), pillHalf, pillR) -
          sdRoundedBox(pLocal - vec2(0.0, eps), pillHalf, pillR)
        ));

        // Rim weight: 0 at center, 1 at rim. Concentrates bend at the edge,
        // matching the way a real meniscus refracts most where curvature is
        // steepest. The shape is a smooth pow ramp on the normalised SDF.
        float rimNorm = clamp(1.0 - (-d) / pillR, 0.0, 1.0);
        float rim     = pow(rimNorm, 2.2);

        // Maximum offset in pixels — proportional to pill size for consistency.
        float maxOffset = pillR * 0.32;
        vec2  offset    = nrm * rim * maxOffset;
        // Convert pixel offset to texture-UV offset (y inverts because the
        // backdrop texture is y-down while frag is y-up).
        vec2  texOffset = vec2(offset.x, -offset.y) / iResolution;

        // Multi-sample for a tiny bit of softness — gives the refraction a
        // believable depth-of-field rather than a razor-crisp displacement.
        // 5-tap diamond pattern, cheap on mobile GPU.
        vec3 acc = vec3(0.0);
        float weights = 0.0;
        const float blurPx = 0.6;
        vec2 blur = vec2(blurPx) / iResolution;
        for (int i = 0; i < 5; i++) {
          vec2 o = vec2(
            (i == 1) ?  1.0 : (i == 2 ? -1.0 : 0.0),
            (i == 3) ?  1.0 : (i == 4 ? -1.0 : 0.0)
          );
          vec2 uv = buv + texOffset + o * blur;
          acc += texture2D(iBackdrop, uv).rgb;
          weights += 1.0;
        }
        vec3 refracted = acc / weights;

        // Chromatic aberration — sample R/B with slight extra spread at rim.
        // Almost too subtle to see; the kind of detail that separates 7→9.
        float ca = rim * 1.2;
        vec3 chroma;
        chroma.r = texture2D(iBackdrop, buv + texOffset * (1.0 + ca * 0.03)).r;
        chroma.g = refracted.g;
        chroma.b = texture2D(iBackdrop, buv + texOffset * (1.0 - ca * 0.03)).b;
        refracted = mix(refracted, chroma, 0.6);

        // Slight brightness lift through the body — pure clear glass concentrates
        // light, gives the interior its hint of warmth.
        refracted *= 1.04;

        // Press-driven illumination spreads through the body and brightens the
        // refracted backdrop slightly. The CSS .lg-pill__glow handles the
        // visible hotspot; this gives the inside-the-glass brightness lift.
        float pressDist = distance(frag, iPress);
        float pressFall = 1.0 - smoothstep(0.0, pillR * 1.6, pressDist);
        refracted += vec3(0.06) * pressFall * iPressIntensity;

        gl_FragColor = vec4(refracted, inside);
      }
    </script>

    <script id="lensVertShader" type="x-shader/x-vertex">
      attribute vec2 a_pos;
      void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
    </script>

    <script src="script.js"></script>
  </body>
</html>
