<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Liquid Glass — Scroll Lensing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Layer 0: dark list content. Drawn to canvas AND used as the lens texture. -->
    <canvas id="backdrop" aria-hidden="true"></canvas>

    <!-- Layer 1: WebGL refraction. Transparent outside the pill silhouette. -->
    <canvas id="lens" aria-hidden="true"></canvas>

    <!-- Layer 2: transparent pill body carrying the elevation shadow + mic. -->
    <div id="pill" class="pill">
      <span class="pill__mic" aria-hidden="true">
        <svg width="22" height="30" viewBox="0 0 22 30" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="7" y="2" width="8" height="15" rx="4" fill="currentColor" stroke="none" />
          <path d="M3 13a8 8 0 0 0 16 0" />
          <line x1="11" y1="21" x2="11" y2="27" />
          <line x1="7" y1="27" x2="15" y2="27" />
        </svg>
      </span>
    </div>

    <div class="hint">scroll &#x2195;</div>

    <script id="vert" type="x-shader/x-vertex">
      attribute vec2 a_pos;
      void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
    </script>

    <!-- =====================================================================
         Lens fragment shader — thick-lens refraction with a folding rim.

         Cross-section model: height is flat (=1) across the interior and rolls
         down to 0 within iRimBand of the silhouette edge along a quarter-round
         curve. The surface normal is derived from that height field; a vertical
         view ray is refracted through it and marched down by iThickness to find
         the backdrop sample. Near the rim the normal tilts hard, the refracted
         rays cross, and the sample map folds -> the inverted mirror copy.
         ===================================================================== -->
    <script id="frag" type="x-shader/x-fragment">
      precision highp float;

      uniform vec2      iResolution;  // device px
      uniform vec4      iPill;        // x,y top-left + w,h, device px (y from top)
      uniform sampler2D iBackdrop;
      uniform float     iThickness;   // glass depth, device px (fold magnitude)
      uniform float     iRimBand;     // width of the rounded rim band, device px
      uniform float     iSlope;       // peak surface slope at mid-band (fold shape)
      uniform float     iInnerClear;  // clear ring that buffers reflections, device px
      uniform float     iOuterRim;    // lit specular rim width, device px
      uniform float     iRimLight;    // lit rim brightness
      uniform float     iEta;         // air/glass index ratio (~1/1.5)
      uniform float     iDampen;      // 0..1 attention dampening of refracted content

      float sdRoundBox(vec2 p, vec2 b, float r) {
        vec2 q = abs(p) - b + vec2(r);
        return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
      }

      void main() {
        vec2 frag = gl_FragCoord.xy;            // y-up
        vec2 res  = iResolution;

        vec2  pillCenter = vec2(iPill.x + iPill.z * 0.5, res.y - (iPill.y + iPill.w * 0.5));
        vec2  pillHalf   = vec2(iPill.z * 0.5, iPill.w * 0.5);
        float pillR      = min(pillHalf.x, pillHalf.y);

        vec2  p = frag - pillCenter;
        float d = sdRoundBox(p, pillHalf, pillR);   // <0 inside

        if (d > 1.0) { gl_FragColor = vec4(0.0); return; }
        float silh = smoothstep(1.0, -1.0, d);

        // Outward unit gradient of the SDF (the surface "downhill" direction).
        float eps = 1.0;
        vec2 grad = normalize(vec2(
          sdRoundBox(p + vec2(eps, 0.0), pillHalf, pillR) - sdRoundBox(p - vec2(eps, 0.0), pillHalf, pillR),
          sdRoundBox(p + vec2(0.0, eps), pillHalf, pillR) - sdRoundBox(p - vec2(0.0, eps), pillHalf, pillR)
        ) + 1e-6);

        // Rim band slope profile. The surface slope peaks in the MIDDLE of the
        // band (not at the very edge), which places the refraction caustic
        // mid-band: inside the caustic the sample map folds -> the inverted
        // mirror copy; outside it the upright copy advances to the flat centre.
        float inset = -d;                                   // >=0 inside
        float e = clamp(inset / iRimBand, 0.0, 1.0);        // 0 at rim, 1 at flat
        float slope = iSlope * 4.0 * e * (1.0 - e);         // peak at e=0.5

        // Surface normal tilts outward across the rim band.
        vec3 N = normalize(vec3(grad * slope, 1.0));
        vec3 I = vec3(0.0, 0.0, -1.0);

        // Subtle vertical asymmetry: 0 at top, 1 at bottom of the pill.
        float ty = clamp((pillCenter.y + pillHalf.y - frag.y) / (2.0 * pillHalf.y), 0.0, 1.0);

        vec3  R = refract(I, N, iEta);
        float thick = iThickness * (1.0 + 0.01 * (ty - 0.5));   // bottom refracts ~1% more
        float march = (R.z < -1e-4) ? (-thick / R.z) : 0.0;
        vec2  offset = R.xy * march;                            // device px, y-up

        // Thin inner clear ring buffering reflections off the lit rim.
        float clearRamp = smoothstep(0.0, iInnerClear, inset);
        offset *= clearRamp;

        // Backdrop texture is uploaded y-flipped, so negate offset.y.
        vec2 sampleUv = (frag + vec2(offset.x, -offset.y)) / res;
        vec3 col = texture2D(iBackdrop, sampleUv).rgb;

        // Attention dampening + top-brighter light gradient.
        col = mix(col, vec3(0.40), iDampen);
        col *= (1.0 + 0.05 * (0.5 - ty));

        // Outer lit rim: a bright hairline at the very edge, brighter at the top
        // and dimmer toward the bottom so the edge reads as a rounded 2.5D bevel.
        // Just inside it slope ~ 0, so refraction is negligible -> the inner
        // clear buffer layer that the reflections never overwrite.
        float rim = smoothstep(iOuterRim, 0.0, inset);
        float topLight = mix(0.4, 1.0, 1.0 - ty);
        col += vec3(1.0) * rim * topLight * iRimLight;

        gl_FragColor = vec4(col * silh, silh);   // premultiplied
      }
    </script>

    <script src="script.js"></script>
  </body>
</html>
