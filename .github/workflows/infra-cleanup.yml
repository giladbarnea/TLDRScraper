name: Infra Cleanup

on:
  schedule:
    - cron: '0 1 * * *'    # Vercel: nightly at 1 AM UTC
    - cron: '0 3 * * 0'    # Supabase: Sundays at 3 AM UTC
  workflow_dispatch:

jobs:
  vercel:
    name: Clean Vercel Deployments
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 1 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Delete old deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: uv run --with=requests python3 scripts/clean_vercel_deployments.py

  supabase:
    name: Clean Supabase Cache
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * 0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install supabase
      - name: Delete old daily cache entries
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python3 - <<'PY'
          import os
          from datetime import datetime, timedelta
          from supabase import create_client

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SECRET_KEY"]
          supabase = create_client(url, key)

          cutoff_date = (datetime.now() - timedelta(days=7)).strftime('%Y-%m-%d')
          print(f"Deleting daily_cache entries older than {cutoff_date}...")

          result = supabase.table('daily_cache').delete().lt('date', cutoff_date).execute()

          deleted_count = len(result.data) if result.data else 0
          print(f"Deleted {deleted_count} old cache entries")
          PY
