name: Maintain Documentation

on:
  push:
    branches:
      - main

jobs:
  update-frontmatter:
    name: Update Markdown Frontmatter
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      modified_files: ${{ steps.update.outputs.modified_files }}
      has_changes: ${{ steps.update.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update doc frontmatter
        id: update
        run: |
          chmod +x scripts/update_doc_frontmatter.py

          skip_paths=$(awk 'NF && !/^#/ {print $3}' synced_external_subdirs.txt 2>/dev/null | paste -sd, || true)
          python scripts/update_doc_frontmatter.py --skip="$skip_paths" > frontmatter_output.txt 2>&1
          cat frontmatter_output.txt

          # Extract modified files from output for next job
          if grep -q "✓ Updated:" frontmatter_output.txt; then
            modified=$(grep "✓ Updated:" frontmatter_output.txt | sed 's/✓ Updated: //' | tr '\n' ',' | sed 's/,$//')
            echo "modified_files=$modified" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.update.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add '*.md' || true

          if git diff --staged --quiet; then
            echo "No changes to documentation frontmatter"
          else
            git commit -m "chore: Update doc frontmatter [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi